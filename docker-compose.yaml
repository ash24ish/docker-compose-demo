services:
  app:
    build: .
    ports:
      - 3000:3000
    # environment:
    #   - MONGO_DB_USERNAME=root
    #   - MONGO_DB_PASSWORD=root
    volumes:
      - uploads-data:/home/app/uploads
    depends_on:
      - mongodb
  mongodb:
    image: mongo:latest
    # ports:
    #   - 27017:27017
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=root
    volumes:
      - mongo-data:/data/db
  mongo-express:
    image: mongo-express:1.0.2-20-alpine3.19
    ports:
      - 8081:8081
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=root
      - ME_CONFIG_MONGODB_ADMINPASSWORD=root
      - ME_CONFIG_MONGODB_SERVER=mongodb # write mongodb servicename here 
volumes:
  mongo-data: # this is volumn name can be anything, change it at line 21 also
    # name: my-custome-mongo-volume-name # optional by default name will be -> <project>_<volume-name>
  uploads-data:
    # this volume stores the images and videos of uploads folder 