<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Upload Form</title>
    <style>
    body {
      font-family: Arial;
      display: flex;
      gap: 40px;
      padding: 20px;
    }

    .form-container {
      width: 40%;
    }

    .list-container {
      width: 60%;
    }

    .user-card {
      border: 1px solid #ccc;
      padding: 10px;
      margin-bottom: 10px;
      border-radius: 6px;
    }

    img {
      width: 80px;
      margin-right: 5px;
    }
  </style>
</head>

<body>
    <div class="form-container">
    <h2>User Form</h2>

    <form id="userForm">
      <input type="text" name="name" placeholder="Name" required><br><br>
      <input type="text" name="mobile" placeholder="Mobile" required><br><br>
      <input type="email" name="email" placeholder="Email" required><br><br>
      <input type="text" name="address" placeholder="Address"><br><br>
      <input type="text" name="location" placeholder="Location"><br><br>

      Photos: <input type="file" name="photos" multiple><br><br>
      Videos: <input type="file" name="videos" multiple><br><br>

      <button type="submit">Submit</button>
    </form>
  </div>

  <!-- RIGHT SIDE USER LIST -->
  <div class="list-container">
  <h2>Users List</h2>

  <button id="refreshBtn">Load Latest Users</button>
  <br><br>

  <div id="userList"></div>
</div>

<script src="index.js"></script>
</body>

</html>
